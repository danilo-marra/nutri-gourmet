name: nutri-gourmet-sys
services:
  nutri_gourmet_sys:
    container_name: nutri_gourmet_sys
    image: "postgres:16.0-alpine3.18"
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
  mailcatcher:
    container_name: "nutri-gourmet-mailcatcher-dev"
    image: "sj26/mailcatcher"
    ports:
      - "1025:1025"
      - "1080:1080"
